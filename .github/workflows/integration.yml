name: Integration

# Live integration suite (test/integration/**): connects real WDK adapters to
# real test networks with the pre-funded Alice & Bob wallets (repo secrets).
#
# Trigger model: this suite exists to catch wire-contract drift, which happens
# when adapter code (or a dep) changes — so it runs on PRs / pushes that touch
# the relevant paths, plus manual dispatch. No nightly cron: a blind nightly
# mostly flakes and drains the send-test wallets with no code change behind it.
#
# Send tests move real (test-network) funds and run by DEFAULT here (nothing is
# skipped); the manual dispatch can turn them off for a quick read-only check.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/integration/**'
      - 'package.json'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/integration/**'
      - 'package.json'
      - '.github/workflows/integration.yml'
  workflow_dispatch:
    inputs:
      run_send_tests:
        description: 'Run fund-moving send/transfer tests'
        type: boolean
        default: true

concurrency:
  # The suites are stateful per wallet (rgb-lib data dirs, wallet balances) —
  # never run two instances against Alice & Bob at once.
  group: integration-alice-bob
  cancel-in-progress: false

jobs:
  integration:
    name: Live integration (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Node 22, NOT 24: @utexo/rgb-lib's SWIG bindings use v8 APIs removed in
      # Node 24 (FunctionCallbackInfo::Holder) and fail to compile there.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --ignore-scripts --no-audit --no-fund

      # Only the RGB-L1 native bindings need lifecycle scripts (node-gyp build
      # against the prebuilt librgblibcffi). Rebuild that one package instead
      # of installing the whole tree with scripts enabled.
      - name: Build rgb-lib native bindings
        run: npm rebuild @utexo/rgb-lib-linux-x64

      - name: Run integration suite
        env:
          ALICE_MNEMONIC: ${{ secrets.ALICE_MNEMONIC }}
          BOB_MNEMONIC: ${{ secrets.BOB_MNEMONIC }}
          # Send tests run by default (push/PR); a dispatch can opt out via the input.
          RUN_SEND_TESTS: ${{ github.event_name != 'workflow_dispatch' && '1' || (inputs.run_send_tests && '1' || '') }}
        run: npm run test:integration
