name: Publish to npm

# Publishes @kaleidorg/wallet-engine to npm.
#   - Automatically on a pushed version tag (e.g. `git tag v1.0.0-beta.3 && git push --tags`).
#   - Or manually via "Run workflow" (workflow_dispatch).
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights to @kaleidorg).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag (leave blank to auto: beta for prereleases, latest otherwise)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # --ignore-scripts skips the WDK SDKs' native postinstalls; the build only needs types.
      - run: npm install --ignore-scripts --no-audit --no-fund

      - run: npm run build

      # Gate the release on the unit suite — never publish an untested build.
      - name: Test
        run: npm test

      # Verify the ACTUAL published artifact: pack the tarball, install it into a
      # bare project with NO protocol SDKs, and import the root barrel in plain
      # Node. Catches a broken/non-ESM dist and any regression to the SDK-free-root
      # guarantee (a root that pulls in a protocol SDK would fail here).
      - name: Verify package imports (bare Node, no peers)
        run: |
          set -euo pipefail
          TGZ="$(npm pack --silent | tail -1)"
          WORK="$(mktemp -d)"
          mv "$TGZ" "$WORK/"
          cd "$WORK"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "./$TGZ"
          node --input-type=module -e "
            const m = await import('@kaleidorg/wallet-engine');
            if (typeof m.classifyDestination !== 'function') { throw new Error('root barrel missing expected export'); }
            console.log('OK: root barrel imports in bare Node with', Object.keys(m).length, 'exports');
          "

      - name: Resolve dist-tag
        id: disttag
        env:
          INPUT_TAG: ${{ github.event.inputs.dist_tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif printf '%s' "$VERSION" | grep -q '-'; then
            TAG="beta"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION with dist-tag '$TAG'"

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ steps.disttag.outputs.tag }}
        run: npm publish --access public --tag "$DIST_TAG"
