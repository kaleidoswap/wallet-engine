name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install --ignore-scripts --no-audit --no-fund

      - name: Type-check + build (tsc)
        run: npm run build

      - name: Test
        run: npm test

      # Audit only the engine's own runtime deps (@scure/*). The heavy protocol
      # SDKs are OPTIONAL and host-owned, so their transitive advisories are out
      # of scope here and must not break this repo's CI.
      - name: Audit production dependencies (high+)
        run: npm audit --omit=dev --omit=optional --audit-level=high
